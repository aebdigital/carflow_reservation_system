services:
  - type: web
    name: carflow-reservation-system
    env: node
    plan: free
    buildCommand: node verify-json.js && npm cache clean --force && cd server && npm install --no-cache
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    healthCheckPath: /api/health 